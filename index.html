<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seddiqi Ownership Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-logo" viewBox="0 0 36 36" fill="none" aria-label="Seddiqi Ownership Hub">
        <circle cx="18" cy="18" r="17" stroke="#c9a35b" stroke-width="1.2"/>
        <circle cx="18" cy="18" r="10" stroke="#c9a35b" stroke-width="0.8" stroke-dasharray="2 2"/>
        <line x1="18" y1="18" x2="18" y2="9" stroke="#c9a35b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="18" y1="18" x2="24" y2="20" stroke="#e8d5a3" stroke-width="1" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="1.5" fill="#c9a35b"/>
        <line x1="18" y1="1" x2="18" y2="4" stroke="#c9a35b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="18" y1="32" x2="18" y2="35" stroke="#c9a35b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1" y1="18" x2="4" y2="18" stroke="#c9a35b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="32" y1="18" x2="35" y2="18" stroke="#c9a35b" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Seddiqi</span>
        <span class="brand-sub">Ownership Hub</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
      <button class="nav-item active" data-view="portfolio">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="6" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="12" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="13" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="12" y="10" width="6" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        <span>Portfolio</span>
      </button>
      <button class="nav-item" data-view="services">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a1 1 0 011 1v1.07A6 6 0 0115.93 9H17a1 1 0 110 2h-1.07A6 6 0 0111 15.93V17a1 1 0 11-2 0v-1.07A6 6 0 014.07 11H3a1 1 0 110-2h1.07A6 6 0 019 4.07V3a1 1 0 011-1zm0 4a4 4 0 100 8 4 4 0 000-8z" stroke="currentColor" stroke-width="0.3" fill="currentColor" fill-opacity="0.15"/><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.4"/></svg>
        <span>Services</span>
      </button>
      <button class="nav-item" data-view="profile">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Profile</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="tier-badge">
        <span class="tier-dot"></span>
        <span>Connoisseur Tier</span>
      </div>
    </div>
  </aside>

  <!-- ── Mobile top bar ──────────────────────────────────── -->
  <header class="mobile-header">
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <span class="mobile-brand">Seddiqi Hub</span>
    <div style="width:36px"></div>
  </header>

  <!-- ── Main content ────────────────────────────────────── -->
  <main id="app-root" class="app-root"></main>

  <!-- ── View templates ─────────────────────────────────── -->
  <template id="portfolio-view">
    <div class="view-header">
      <div>
        <h1 class="view-title">Your Collection</h1>
        <p class="view-subtitle">Track pieces, health scores and upcoming service windows.</p>
      </div>
      <button class="btn btn-primary" id="add-watch-btn">+ Add Piece</button>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <span class="kpi-icon">&#128336;</span>
        <div>
          <span class="kpi-label">Total Pieces</span>
          <span class="kpi-value" id="kpi-total-pieces">0</span>
        </div>
      </div>
      <div class="kpi-card">
        <span class="kpi-icon">&#9830;</span>
        <div>
          <span class="kpi-label">Portfolio Value</span>
          <span class="kpi-value" id="kpi-total-value">0</span>
          <span class="kpi-unit">AED</span>
        </div>
      </div>
      <div class="kpi-card">
        <span class="kpi-icon">&#128200;</span>
        <div>
          <span class="kpi-label">Avg Health Score</span>
          <span class="kpi-value" id="kpi-avg-health">0</span>
          <span class="kpi-unit">/100</span>
        </div>
      </div>
      <div class="kpi-card kpi-alert" id="kpi-overdue-card">
        <span class="kpi-icon">&#9888;</span>
        <div>
          <span class="kpi-label">Need Attention</span>
          <span class="kpi-value" id="kpi-overdue">0</span>
          <span class="kpi-unit">pieces</span>
        </div>
      </div>
    </div>

    <div id="watch-list" class="watch-grid"></div>
  </template>

  <template id="services-view">
    <div class="view-header">
      <div>
        <h1 class="view-title">Service Bouquet</h1>
        <p class="view-subtitle">White-glove after-sales services powered by Swiss Watch Services.</p>
      </div>
    </div>
    <div id="service-list" class="services-grid"></div>
  </template>

  <template id="profile-view">
    <div class="view-header">
      <div>
        <h1 class="view-title">Your Profile</h1>
        <p class="view-subtitle">Membership, preferences and notification settings.</p>
      </div>
    </div>
    <div class="profile-layout">
      <div class="profile-main">
        <div class="profile-hero">
          <div class="avatar">AC</div>
          <div>
            <h2 class="profile-name">Ahmed Collector</h2>
            <span class="tier-pill">Connoisseur</span>
          </div>
        </div>
        <div class="profile-section">
          <h3 class="section-label">Account Details</h3>
          <div class="detail-row"><span>Location</span><span>Dubai, UAE</span></div>
          <div class="detail-row"><span>Member since</span><span>2019</span></div>
          <div class="detail-row"><span>Preferred language</span><span>English</span></div>
        </div>
        <div class="profile-section">
          <h3 class="section-label">Notifications</h3>
          <div class="detail-row">
            <span>Service nudges</span>
            <label class="switch"><input type="checkbox" id="toggle-nudges" checked /><span class="slider"></span></label>
          </div>
          <div class="detail-row">
            <span>CPO offers</span>
            <label class="switch"><input type="checkbox" id="toggle-cpo" checked /><span class="slider"></span></label>
          </div>
          <div class="detail-row">
            <span>Market value alerts</span>
            <label class="switch"><input type="checkbox" id="toggle-market" /><span class="slider"></span></label>
          </div>
        </div>
      </div>
      <div class="profile-side">
        <div class="membership-card">
          <div class="mc-top">
            <span class="mc-label">MEMBERSHIP TIER</span>
            <svg viewBox="0 0 36 36" fill="none" width="32" height="32"><circle cx="18" cy="18" r="17" stroke="#c9a35b" stroke-width="1"/><circle cx="18" cy="18" r="10" stroke="#c9a35b" stroke-width="0.6" stroke-dasharray="2 2"/><line x1="18" y1="18" x2="18" y2="9" stroke="#c9a35b" stroke-width="1.4" stroke-linecap="round"/><line x1="18" y1="18" x2="24" y2="20" stroke="#e8d5a3" stroke-width="1" stroke-linecap="round"/><circle cx="18" cy="18" r="1.5" fill="#c9a35b"/></svg>
          </div>
          <div class="mc-tier">Connoisseur</div>
          <div class="mc-perks">
            <div class="mc-perk">&#10003; Priority service booking</div>
            <div class="mc-perk">&#10003; White glove pickup included</div>
            <div class="mc-perk">&#10003; Annual complimentary spa</div>
            <div class="mc-perk">&#10003; CPO early access</div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ── Modal ──────────────────────────────────────────── -->
  <div id="modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <button class="modal-close" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
